<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Performance AI | Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="flex-center vh-100 overflow-hidden">

    <div class="glass-card animate-fade-in w-100 max-w-450 p-3">
        <div class="text-center m-b-2-5">
            <div class="logo font-medium m-b-1">
                <span class="gold-gradient-text">ELITE</span> AI
            </div>
            <p class="gray-text">Enter your credentials to access the analytics portal</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="m-b-1">
                <label class="m-b-1 small-text uppercase gold-gradient-text font-bold">Username</label>
                <input type="text" id="username" required placeholder="Enter username" class="input-premium"
                    autocomplete="username">
            </div>
            <div class="m-b-2">
                <label class="m-b-1 small-text uppercase gold-gradient-text font-bold">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="input-premium"
                    autocomplete="current-password">
            </div>

            <button type="submit" class="btn-premium w-100 font-1-1 p-14">Sign In to Portal</button>
        </form>

        <div class="m-t-2 text-center small-text">
            <p class="gray-text">Initial Admin: <span class="gold-gradient-text font-bold">admin / admin123</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
